<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fill Your Jerry Can - Charity: Water</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="start-page">
    <div class="logo-corners">
        <img src="https://s3-eu-west-1.amazonaws.com/tpd/logos/4bf043af00006400050c3c56/0x0.png" alt="Charity: water logo" class="logo logo-top-left">
        <img src="https://s3-eu-west-1.amazonaws.com/tpd/logos/4bf043af00006400050c3c56/0x0.png" alt="Charity: water logo" class="logo logo-top-right">
    </div>
    
    <div class="container start-container">
        <header class="header">
            <h1 class="charity-header">Charity: Water</h1>
        </header>
        
        <main class="start-main">
            <h2 class="game-title">Fill Your Jerry Can</h2>
            
            <div class="jerry-can-image">
                <img src="https://cdn2.dropmarkusercontent.com/52043/d7449ee483985720ae2ff75e187daeb1e680c02acb66f1c58e31218bb9c53ec2/cw_Selects_4x5_10.jpg?Expires=1780621144&Signature=aCrCW~M4NXW2XXmcWs3cljVhW4C3~yC9G2y8j8qnlw-GxwikDVfyk6BZ1JyWMpVXC4Rp0yc8cm57FdGzm5Rm7KvXnhemx4SlQj2BffU4KWnULDbYsFNdLetkqPj0rq0lFRmopq13ZehfAG08b2XG9LcIibnmlYStcqVvg~jTWjmRfyAwoMpSPJPEXzXrDYa5VJ3YQiGFxSlKjAipNezrwa8olQT~Oil1nFAGL6IBbPlxx4LkQaAvCrUcZgUggE7silinIgwsVDODHMZIq-dVP1e83DDv5MAm4bPAvzu1TcxgZjLnDoxZtTRVAuARqJwJ2f4JYdME~FZMTjohRI8Y-Q__&Key-Pair-Id=APKAITQYWVEN757ZA4KQ" alt="Fill Your Jerry Can" class="main-image" loading="eager" decoding="sync" data-fallback-src="jerry-can.svg">
            </div>
            
            <p class="intro-text">Help bring clean water to communities in need. Click "Play Now" to start collecting!</p>
            
            <button class="btn btn-play" onclick="window.location.href='game.html'">Play Now</button>
        </main>
    </div>
    <script>
        (function() {
            function updateFoldableHeight() {
                const width = window.innerWidth;
                const height = window.innerHeight;
                const aspectRatio = height / width;

                if (width <= 760 && aspectRatio >= 2.3) {
                    document.documentElement.style.setProperty('--app-height', `${height}px`);
                }
            }

            function ensureStartImageLoads() {
                const image = document.querySelector('.main-image');
                if (!image) return;

                image.loading = 'eager';
                image.decoding = 'sync';
                image.style.visibility = 'visible';

                image.addEventListener('error', function() {
                    if (!this.dataset.fallbackApplied) {
                        this.dataset.fallbackApplied = 'true';
                        if (this.dataset.fallbackSrc) {
                            this.src = this.dataset.fallbackSrc;
                        }
                    }
                });

                if (!image.complete || image.naturalWidth === 0) {
                    const reloader = new Image();
                    reloader.onload = function() {
                        image.src = reloader.src;
                    };
                    reloader.onerror = function() {
                        if (!image.dataset.fallbackApplied && image.dataset.fallbackSrc) {
                            image.dataset.fallbackApplied = 'true';
                            image.src = image.dataset.fallbackSrc;
                        }
                    };
                    reloader.src = image.src;
                }
            }

            updateFoldableHeight();
            ensureStartImageLoads();
            window.addEventListener('resize', updateFoldableHeight);
            window.addEventListener('orientationchange', function() {
                setTimeout(updateFoldableHeight, 120);
            });
        })();
    </script>
</body>
</html>
